<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Logs - School Management V2</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #0f172a;
        --sidebar-bg: #111827;
        --card-bg: rgba(30, 41, 59, 0.7);
        --accent: #3b82f6;
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        width: 260px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 24px;
      }
      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 40px;
      }
      .nav-label {
        font-size: 0.65rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 25px 0 10px 10px;
        font-weight: 800;
        opacity: 0.7;
      }
      .nav-list {
        list-style: none;
        margin-bottom: 10px;
      }
      .nav-item {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 4px;
        cursor: pointer;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
        font-size: 0.9rem;
        transition: 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }
      .sub-nav {
        margin-left: 28px;
        border-left: 1px solid var(--border);
        padding-left: 12px;
      }
      .sub-item {
        padding: 8px 12px;
        font-size: 0.85rem;
        color: var(--text-dim);
        text-decoration: none;
        display: block;
        border-radius: 8px;
        transition: 0.2s;
      }
      .sub-nav a.active {
        color: var(--accent);
        background: rgba(59, 130, 246, 0.1);
        font-weight: 600;
      }
      .main-content {
        flex-grow: 1;
        padding: 30px 40px;
        overflow-y: auto;
      }
      .table-container {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }
      td {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">School V2</div>
      <div class="nav-label">Main</div>
      <nav class="nav-list">
        <a href="index.html" class="nav-item">📊 Dashboard</a>
      </nav>
      <div class="nav-label">Academic Data</div>
      <nav class="nav-list">
        <a href="teachers.html" class="nav-item">👨‍🏫 Teachers</a>
        <a href="students.html" class="nav-item">👨‍🎓 Students</a>
        <a href="subjects.html" class="nav-item">📚 Subjects</a>
        <a href="classes.html" class="nav-item">🏫 Classes</a>
        <a href="schedules.html" class="nav-item">📅 Schedules</a>
      </nav>
    </aside>
    <main class="main-content">
      <h1>System Audit Logs</h1>
      <div class="table-container">
        <table>
          <tbody>
            <tr>
              <td>Teachers</td>
              <td>42</td>
              <td>UPDATE</td>
              <td>2026-03-10</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
