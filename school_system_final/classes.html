<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classroom Management - SMS V3</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #020617;
        --sidebar-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.4);
        --accent: #6366f1;
        --accent-glow: rgba(99, 102, 241, 0.3);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --border: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: var(--text-primary);
        display: flex;
        height: 100vh;
        overflow: hidden;
        letter-spacing: -0.011em;
      }
      .sidebar {
        width: 280px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 32px 24px;
      }
      .logo {
        font-weight: 800;
        font-size: 1.25rem;
        margin-bottom: 48px;
        display: flex;
        align-items: center;
        gap: 14px;
        letter-spacing: -0.04em;
      }
      .logo-box {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px var(--accent-glow);
      }
      .nav-label {
        font-size: 0.65rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin: 32px 0 12px 12px;
        font-weight: 700;
      }
      .nav-list {
        list-style: none;
      }
      .nav-link {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 6px;
        cursor: pointer;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
        font-size: 0.925rem;
        transition: all 0.3s;
        text-decoration: none;
        position: relative;
      }
      .nav-link i {
        font-size: 1.1rem;
        width: 24px;
        text-align: center;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.04);
        color: white;
      }
      .nav-link.active {
        background: rgba(99, 102, 241, 0.08);
        color: var(--accent);
      }
      .nav-link.active::after {
        content: "";
        position: absolute;
        left: -24px;
        top: 25%;
        height: 50%;
        width: 4px;
        background: var(--accent);
        border-radius: 0 4px 4px 0;
      }
      .sub-nav {
        margin-left: 20px;
        border-left: 1px solid var(--border);
        padding-left: 12px;
      }
      .sub-link {
        padding: 10px 14px;
        font-size: 0.875rem;
        color: var(--text-secondary);
        text-decoration: none;
        display: block;
        border-radius: 8px;
        transition: 0.2s;
      }
      .sub-link:hover {
        color: white;
        background: rgba(255, 255, 255, 0.03);
      }
      .main-content {
        flex-grow: 1;
        padding: 40px 60px;
        overflow-y: auto;
        background: radial-gradient(
          circle at 50% 0%,
          rgba(30, 41, 59, 0.3) 0%,
          transparent 50%
        );
      }
      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 40px;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        box-shadow: 0 10px 20px -5px var(--accent-glow);
      }
      .table-card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        padding: 32px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 16px;
        color: #64748b;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 20px 16px;
        font-size: 0.95rem;
        border-bottom: 1px solid var(--border);
      }
      .capacity-bar {
        height: 6px;
        background: #1e293b;
        border-radius: 3px;
        overflow: hidden;
        width: 100px;
        margin-top: 8px;
      }
      .capacity-fill {
        height: 100%;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-box"><i class="fas fa-graduation-cap"></i></div>
        SCHOOL<span style="color: var(--accent)">V3</span>
      </div>
      <div class="nav-label">Main Dashboard</div>
      <nav class="nav-list">
        <a href="index.html" class="nav-link"
          ><i class="fas fa-columns"></i> Dashboard</a
        >
      </nav>
      <div class="nav-label">Academic Center</div>
      <nav class="nav-list">
        <a href="teachers.html" class="nav-link"
          ><i class="fas fa-user-tie"></i> Teachers</a
        >
        <a href="students.html" class="nav-link"
          ><i class="fas fa-user-graduate"></i> Students</a
        >
        <a href="subjects.html" class="nav-link"
          ><i class="fas fa-book"></i> Subjects</a
        >
        <a href="classes.html" class="nav-link active"
          ><i class="fas fa-door-open"></i> Classes</a
        >
        <a href="schedules.html" class="nav-link"
          ><i class="fas fa-calendar-alt"></i> Schedules</a
        >
      </nav>
    </aside>

    <main class="main-content">
      <div class="header-actions">
        <div>
          <h1
            style="
              font-size: 2.25rem;
              font-weight: 800;
              letter-spacing: -0.05em;
            "
          >
            Classrooms
          </h1>
          <p style="color: var(--text-secondary); margin-top: 4px">
            Structural organization of students and capacity control.
          </p>
        </div>
        <button class="btn-primary">
          <i class="fas fa-plus"></i> Initialize Room
        </button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Class Designation</th>
              <th>Room ID</th>
              <th>Utilization</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="font-weight: 700">X - Science A</td>
              <td style="color: var(--text-secondary)">BLOCK-A-102</td>
              <td>
                <div style="font-size: 0.8rem; font-weight: 600">
                  32 / 35 Students
                </div>
                <div class="capacity-bar">
                  <div class="capacity-fill" style="width: 91%"></div>
                </div>
              </td>
              <td>
                <i
                  class="fas fa-cog"
                  style="margin-right: 15px; cursor: pointer"
                ></i
                ><i class="fas fa-users" style="cursor: pointer"></i>
              </td>
            </tr>
            <tr>
              <td style="font-weight: 700">XII - Arts B</td>
              <td style="color: var(--text-secondary)">BLOCK-C-004</td>
              <td>
                <div style="font-size: 0.8rem; font-weight: 600">
                  18 / 25 Students
                </div>
                <div class="capacity-bar">
                  <div class="capacity-fill" style="width: 72%"></div>
                </div>
              </td>
              <td>
                <i
                  class="fas fa-cog"
                  style="margin-right: 15px; cursor: pointer"
                ></i
                ><i class="fas fa-users" style="cursor: pointer"></i>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </body>
</html>
